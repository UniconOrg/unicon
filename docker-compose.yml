# =============================================================================
# Docker Compose - Desarrollo Local
# Usa el Dockerfile de desarrollo con hot-reload
# =============================================================================

services:
  unicon-landing:
    container_name: unicon-landing
    build:
      context: .
      dockerfile: docker_images/local/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    volumes:
      # Codigo fuente montado para hot-reload
      - .:/app:delegated
      # Volumenes nombrados para evitar conflictos con el host
      - unicon_node_modules:/app/node_modules
      - unicon_next_cache:/app/.next
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_BASE_URL=${API_BASE_URL:-}
      - TZ=${APP_TIMEZONE:-America/Mexico_City}
      - WATCHPACK_POLLING=true
    networks:
      - unicon_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  unicon_node_modules:
    driver: local
  unicon_next_cache:
    driver: local

networks:
  unicon_network:
    driver: bridge
