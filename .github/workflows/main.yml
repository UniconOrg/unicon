name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-context:
    name: Debug context
    runs-on: ubuntu-latest
    steps:
      - name: Show event/refs
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: debug-context
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          echo "::group::Validating required variables and secrets"

          ERRORS=0

          if [ -z "${{ vars.BRANCH_TAG_MAP }}" ]; then
            echo "::error::BRANCH_TAG_MAP variable is required but not set"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -z "${{ vars.REGISTRY_PROJECT }}" ]; then
            echo "::error::REGISTRY_PROJECT variable is required but not set"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -z "${{ vars.REGISTRY_IMAGE_NAME }}" ]; then
            echo "::error::REGISTRY_IMAGE_NAME variable is required but not set"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -z "${{ secrets.REGISTRY_USERNAME }}" ]; then
            echo "::error::REGISTRY_USERNAME secret is required but not set"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then
            echo "::error::REGISTRY_PASSWORD secret is required but not set"
            ERRORS=$((ERRORS + 1))
          fi

          echo "::endgroup::"

          if [ $ERRORS -gt 0 ]; then
            echo "::error::Configuration validation failed with $ERRORS error(s)"
            exit 1
          fi

          echo "All required configuration is present"

      - name: Determine environment tag and version
        id: env_vars
        env:
          BRANCH_TAG_MAP: ${{ vars.BRANCH_TAG_MAP }}
        run: |
          echo "::group::Determining tag and version"

          BRANCH_NAME="${{ github.ref_name }}"
          echo "Branch: $BRANCH_NAME"
          echo "Branch-Tag Map: $BRANCH_TAG_MAP"

          TAG=$(echo "$BRANCH_TAG_MAP" | jq -r --arg branch "$BRANCH_NAME" '.[$branch]')

          if [[ "$TAG" == "null" || -z "$TAG" ]]; then
            echo "::warning::Branch '$BRANCH_NAME' not found in BRANCH_TAG_MAP"
            TAG="dev"
          fi

          VERSION="${TAG}-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"
          echo "Version: $VERSION"

          echo "::endgroup::"

      - name: Login to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login \
            ${{ vars.REGISTRY_URL || 'docker.io' }} \
            -u "${{ secrets.REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          FULL_IMAGE="${{ vars.REGISTRY_PROJECT }}/${{ vars.REGISTRY_IMAGE_NAME }}"

          docker build \
            -f docker_images/app/Dockerfile.app \
            -t "${FULL_IMAGE}:${{ steps.env_vars.outputs.tag }}" \
            -t "${FULL_IMAGE}:${{ steps.env_vars.outputs.version }}" \
            .

      - name: Push Docker images
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          FULL_IMAGE="${{ vars.REGISTRY_PROJECT }}/${{ vars.REGISTRY_IMAGE_NAME }}"
          docker push "${FULL_IMAGE}:${{ steps.env_vars.outputs.tag }}"
          docker push "${FULL_IMAGE}:${{ steps.env_vars.outputs.version }}"

      - name: Build summary
        run: |
          echo "### Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ steps.env_vars.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.env_vars.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ vars.REGISTRY_PROJECT }}/${{ vars.REGISTRY_IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-development:
    name: Deploy Development
    needs: build-and-push
    if: github.event_name == 'push' && github.ref_name == 'dev'
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: development
    secrets:
      DOKPLOY_DEPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}

  deploy-production:
    name: Deploy Production
    needs: build-and-push
    if: github.event_name == 'push' && github.ref_name == 'main'
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: production
    secrets:
      DOKPLOY_DEPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}
